services:
  telnyx-gemini-bridge:
    build: ./app
    container_name: telnyx-gemini-bridge
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: [[GEMINI_API_KEY]]
      TELNYX_API_KEY: [[TELNYX_API_KEY]]
      TELNYX_PUBLIC_KEY: [[TELNYX_PUBLIC_KEY]]
      PUBLIC_HOST: bridge.ravil.space
      PORT: 3000
      SYSTEM_PROMPT: "You are Claw, an AI assistant making calls on behalf of Ravil. Be concise and professional. Speak in the language the other person uses."
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bridge.rule=Host(`bridge.ravil.space`)"
      - "traefik.http.routers.bridge.entrypoints=websecure"
      - "traefik.http.routers.bridge.tls.certresolver=cloudflare"
      - "traefik.http.services.bridge.loadbalancer.server.port=3000"

networks:
  traefik_default:
    external: true
