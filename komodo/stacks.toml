## Komodo Resource Sync — Stack declarations
## All stacks use the same git repo and server, only run_directory differs.
## Secrets use [[VAR]] syntax — resolved from Komodo Variables at deploy time.

# ─── Infrastructure ──────────────────────────────────────────────

[[stack]]
name = "traefik"
description = "Reverse proxy and SSL termination"
tags = ["infra"]
deploy = true
auto_update = true
[stack.config]
server_id = "Local"
repo = "ravilushqa/homelab"
branch = "main"
run_directory = "komodo/stacks/traefik"
environment = """
ACME_EMAIL = [[ACME_EMAIL]]
CF_DNS_API_TOKEN = [[CF_DNS_API_TOKEN]]
TRAEFIK_OIDC_CLIENT_ID = [[TRAEFIK_OIDC_CLIENT_ID]]
TRAEFIK_OIDC_CLIENT_SECRET = [[TRAEFIK_OIDC_CLIENT_SECRET]]
OIDC_SECRET = [[OIDC_SECRET]]
UMAMI_USERNAME = [[UMAMI_USERNAME]]
UMAMI_PASSWORD = [[UMAMI_PASSWORD]]
"""

[[stack]]
name = "github-runner"
description = "Self-hosted GitHub Actions runner"
tags = ["infra"]
deploy = true
auto_update = true
[stack.config]
server_id = "Local"
repo = "ravilushqa/homelab"
branch = "main"
run_directory = "komodo/stacks/github-runner"
environment = """
ACCESS_TOKEN = [[GITHUB_PAT]]
"""

