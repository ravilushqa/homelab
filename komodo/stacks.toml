## Komodo Resource Sync — Stack declarations
## All stacks use the same git repo and server, only clone_path differs.

# ─── Infrastructure ──────────────────────────────────────────────

[[stack]]
name = "traefik"
description = "Reverse proxy and SSL termination"
tags = ["infra"]
deploy = true
[stack.config]
server_id = "Local"
repo = "ravilushqa/homelab"
branch = "main"
clone_path = "stacks/traefik"

[[stack]]
name = "github-runner"
description = "Self-hosted GitHub Actions runner"
tags = ["infra"]
deploy = true
[stack.config]
server_id = "Local"
repo = "ravilushqa/homelab"
branch = "main"
clone_path = "stacks/github-runner"

