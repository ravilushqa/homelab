name: Build & Deploy hr-breaker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'main'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ravilushqa/hr-breaker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout homelab repo
        uses: actions/checkout@v6

      - name: Checkout hr-breaker source
        uses: actions/checkout@v6
        with:
          repository: btseytlin/hr-breaker
          ref: ${{ inputs.ref || 'main' }}
          path: hr-breaker-src

      - name: Copy Dockerfile from homelab
        run: cp komodo/stacks/hr-breaker/Dockerfile hr-breaker-src/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: hr-breaker-src
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger Komodo redeploy
        run: |
          curl -sf -X POST https://komodo.ravil.space/execute \
            -H "X-Api-Key: ${{ secrets.KOMODO_API_KEY }}" \
            -H "X-Api-Secret: ${{ secrets.KOMODO_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"DeployStack","params":{"stack":"hr-breaker"}}' \
            | jq '{success: .success}'
